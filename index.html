<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>理不尽アクション ― 死んで覚えろ！</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
  }
  h1 {
    color: #ff4444;
    font-size: 22px;
    margin-bottom: 10px;
    text-shadow: 0 0 12px #ff0000;
  }
  #gameCanvas {
    border: 3px solid #ff4444;
    box-shadow: 0 0 20px #ff444488;
    display: block;
  }
  #controls {
    color: #aaaacc;
    font-size: 13px;
    margin-top: 8px;
  }
</style>
</head>
<body>
<h1>💀 理不尽アクション ― 死んで覚えろ！ 💀</h1>
<canvas id="gameCanvas" width="680" height="400"></canvas>
<div id="controls">← → 移動 ｜ ↑ / スペース ジャンプ ｜ 死んだらスタートに戻る</div>
<script>
(function() {
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // roundRect ポリフィル（未対応ブラウザ向け）
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      const rad = Math.min(r, w/2, h/2);
      this.moveTo(x+rad, y);
      this.lineTo(x+w-rad, y);   this.arcTo(x+w, y,   x+w, y+rad,   rad);
      this.lineTo(x+w, y+h-rad); this.arcTo(x+w, y+h, x+w-rad, y+h, rad);
      this.lineTo(x+rad, y+h);   this.arcTo(x, y+h,   x, y+h-rad,   rad);
      this.lineTo(x, y+rad);     this.arcTo(x, y,     x+rad, y,      rad);
      this.closePath();
    };
  }

  // ─── 定数 ─────────────────────────────────────────────
  const W = 680, H = 400;
  const GRAVITY     = 0.45;
  const JUMP_FORCE  = -10;
  const PLAYER_SPEED = 2.8;
  const ACCEL       = 0.45;
  const FRICTION    = 0.78;
  const WORLD_WIDTH = 3000;
  const GROUND_Y    = 340;
  const JUMP_CD     = 18;

  // ─── ゲームステート ───────────────────────────────────
  let gameState  = 'playing'; // 'playing' | 'gameover' | 'clear'
  let lives      = 5;
  let deathCount = 0;
  let cameraX    = 0;
  let animTick   = 0;
  let deathFlash = 0;

  // ─── キー入力 ─────────────────────────────────────────
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code)) e.preventDefault();
    if ((gameState === 'gameover' || gameState === 'clear') && e.code === 'Space') restartGame();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // ─── 通常足場（静的） ─────────────────────────────────
  const PLATFORMS = [
    // 序盤（安全そうなゾーン）
    {x:  180, y: 280, w: 100, h: 20, color: '#4a9e4a'},
    {x:  350, y: 240, w:  80, h: 20, color: '#4a9e4a'},
    // x=450-530 に地面スパイク（初見死ポイント①）
    {x:  580, y: 210, w: 100, h: 20, color: '#4a9e4a'}, // 安全そうに見える足場
    // 中盤
    {x:  750, y: 260, w:  80, h: 20, color: '#5a8a3a'},
    {x:  890, y: 230, w:  90, h: 20, color: '#5a8a3a'},
    // x=970-1060 に消え足場（初見死ポイント②）、下はスパイク穴
    {x: 1130, y: 265, w: 100, h: 20, color: '#5a8a3a'},
    {x: 1310, y: 240, w:  80, h: 20, color: '#5a8a3a'},
    // x=1410 に偽足場トラップ（初見死ポイント③）
    // 後半
    {x: 1600, y: 225, w:  90, h: 20, color: '#8a5a3a'},
    {x: 1760, y: 265, w:  90, h: 20, color: '#8a5a3a'},
    {x: 1920, y: 230, w: 100, h: 20, color: '#8a5a3a'},
    // x=2040 動く天井トラップ
    {x: 2140, y: 270, w: 110, h: 20, color: '#8a5a3a'},
    {x: 2310, y: 240, w:  80, h: 20, color: '#8a4a8a'},
    {x: 2470, y: 205, w:  90, h: 20, color: '#8a4a8a'},
    {x: 2640, y: 250, w:  80, h: 20, color: '#8a4a8a'},
    // ゴール区間
    {x: 2810, y: 270, w: 100, h: 20, color: '#aa7700'},
    {x: 2960, y: 280, w:  80, h: 60, color: '#aa7700'}, // ゴール台
  ];

  // ─── スパイク（触れたら即死） ─────────────────────────
  // dir: 'up'=上向き(地面), 'down'=下向き(天井)
  const SPIKES = [
    // 【初見死①】安全そうな地面に紛れ込んだスパイク（コインで誘導）
    {x: 450, y: GROUND_Y - 20, w:  80, h: 20, dir: 'up'},
    // 消え足場の下の穴（スパイク群）
    {x: 980, y: GROUND_Y - 20, w: 100, h: 20, dir: 'up'},
    // 【初見死③補助】偽足場の下にスパイク
    {x:1420, y: GROUND_Y - 20, w:  80, h: 20, dir: 'up'},
    // 後半地面スパイク（隠れてる）
    {x:1690, y: GROUND_Y - 20, w:  60, h: 20, dir: 'up'},
    // 【初見死③のコア】足場上に着地点スパイク：x=1920の足場の上
    {x:1930, y: 230 - 20,      w:  40, h: 20, dir: 'up'},
    // 後半地面スパイク
    {x:2200, y: GROUND_Y - 20, w:  80, h: 20, dir: 'up'},
    // ゴール直前の最後の罠
    {x:2820, y: 270 - 20,      w:  30, h: 20, dir: 'up'},
  ];

  // ─── 消える足場（踏むと消える、数秒後復活） ──────────
  function makeVanishPlatforms() {
    return [
      // 【初見死②のコア】ここを踏むと消えてスパイク穴に落ちる
      {x:  970, y: 240, w: 90, h: 20, color: '#4a9e4a', state: 'solid', timer: 0, restoreTimer: 0},
      // 後半の消え足場
      {x: 1840, y: 255, w: 80, h: 20, color: '#8a5a3a', state: 'solid', timer: 0, restoreTimer: 0},
      {x: 2390, y: 195, w: 70, h: 20, color: '#8a4a8a', state: 'solid', timer: 0, restoreTimer: 0},
    ];
  }

  // ─── 偽足場（見た目は普通だが乗ると即落下） ─────────
  function makeFakePlatforms() {
    return [
      // 【初見死③のコア】中盤の安全そうな足場、乗ったら落ちてスパイクへ
      {x: 1410, y: 260, w: 100, h: 20, color: '#4a9e4a', state: 'solid', vy: 0, origY: 260},
      // 後半の偽足場
      {x: 2540, y: 215, w:  80, h: 20, color: '#8a4a8a', state: 'solid', vy: 0, origY: 215},
    ];
  }

  // ─── 動く障害物（突然スライドしてくる壁・天井） ───────
  // type: 'hwall'=横スライド, 'vceil'=上から落ちる天井
  function makeMovingObstacles() {
    return [
      // 【序盤罠】x=580の足場に乗ると右から壁が高速スライドイン
      {
        type: 'hwall',
        x: 800, y: 175, w: 30, h: 155,
        origX: 800, targetX: 660,
        vx: 0, active: false, triggered: false,
        triggerX: 545, retractTimer: undefined, color: '#882222'
      },
      // 【後半罠】x=2140の足場に乗ると天井が急落下
      {
        type: 'vceil',
        x: 2140, y: -70, w: 110, h: 55,
        origY: -70, targetY: 225,
        vy: 0, active: false, triggered: false,
        triggerX: 2100, falling: false, retractTimer: 0, color: '#882222'
      },
    ];
  }

  // ─── コイン（罠コイン含む） ───────────────────────────
  function makeCoins() {
    return [
      // 序盤：安全コイン（油断させる）
      {x: 200, y: 260, r: 8, collected: false},
      {x: 225, y: 260, r: 8, collected: false},
      {x: 368, y: 220, r: 8, collected: false},
      // 【罠コイン①】スパイクの手前においてプレイヤーを引き寄せる
      {x: 455, y: GROUND_Y - 38, r: 8, collected: false},
      {x: 478, y: GROUND_Y - 38, r: 8, collected: false},
      // 安全コイン
      {x: 595, y: 190, r: 8, collected: false},
      {x: 618, y: 190, r: 8, collected: false},
      {x: 765, y: 240, r: 8, collected: false},
      {x: 904, y: 210, r: 8, collected: false},
      // 【罠コイン②】消え足場の上に置く（乗ると消えてスパイクへ）
      {x: 1000, y: 220, r: 8, collected: false},
      {x: 1020, y: 220, r: 8, collected: false},
      // 安全コイン
      {x: 1145, y: 245, r: 8, collected: false},
      {x: 1325, y: 218, r: 8, collected: false},
      // 【罠コイン③】偽足場の上に置く
      {x: 1445, y: 238, r: 8, collected: false},
      // 後半コイン
      {x: 1615, y: 205, r: 8, collected: false},
      {x: 1775, y: 245, r: 8, collected: false},
      // 【罠コイン④】足場上スパイクの真上に置く（死にコイン）
      {x: 1942, y: 208, r: 8, collected: false},
      {x: 2155, y: 250, r: 8, collected: false},
      {x: 2325, y: 218, r: 8, collected: false},
      {x: 2485, y: 183, r: 8, collected: false},
      {x: 2655, y: 228, r: 8, collected: false},
      {x: 2826, y: 248, r: 8, collected: false},
    ];
  }

  let vanishPlatforms  = makeVanishPlatforms();
  let fakePlatforms    = makeFakePlatforms();
  let movingObstacles  = makeMovingObstacles();
  let coins            = makeCoins();
  const TOTAL_COINS    = coins.length;

  const goalX   = 2995;
  let goalReached = false;

  // ─── プレイヤー ───────────────────────────────────────
  function makePlayer() {
    return {
      x: 60, y: GROUND_Y - 36,
      w: 28, h: 36,
      vx: 0, vy: 0,
      onGround: false,
      dir: 1,
      walkFrame: 0,
      invincible: 0,
      jumpCooldown: 0,
    };
  }
  let player = makePlayer();

  // ─── トラップリセット ─────────────────────────────────
  function resetTraps() {
    vanishPlatforms = makeVanishPlatforms();
    fakePlatforms   = makeFakePlatforms();
    movingObstacles = makeMovingObstacles();
  }

  // ─── ゲームリスタート ──────────────────────────────────
  function restartGame() {
    lives      = 5;
    deathCount = 0;
    cameraX    = 0;
    animTick   = 0;
    goalReached = false;
    gameState  = 'playing';
    deathFlash = 0;
    player     = makePlayer();
    coins      = makeCoins();
    resetTraps();
  }

  // ─── AABB衝突判定 ─────────────────────────────────────
  function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  // ─── 残機減少（死亡処理） ──────────────────────────────
  function loseLife() {
    if (player.invincible > 0) return;
    deathCount++;
    deathFlash = 25;
    lives--;
    if (lives <= 0) {
      lives = 0;
      gameState = 'gameover';
      return;
    }
    // スタートに戻る（しょぼんスタイル）
    player = makePlayer();
    cameraX = 0;
    player.invincible = 60;
    resetTraps();
  }

  // ─── 足場衝突ヘルパー ─────────────────────────────────
  // 戻り値: true = 上から乗った
  function collidePlatform(px, py, pw, ph, wasOnGround) {
    if (!rectOverlap(player.x, player.y, player.w, player.h, px, py, pw, ph)) return false;
    const prevBottom = player.y + player.h - player.vy;
    if (prevBottom <= py + 2 && player.vy >= 0) {
      player.y  = py - player.h;
      player.vy = 0;
      if (!wasOnGround) player.jumpCooldown = JUMP_CD;
      player.onGround = true;
      return true;
    } else if (player.vy < 0 && player.y <= py + ph) {
      player.y  = py + ph;
      player.vy = 0;
    } else {
      const overlapX = Math.min(player.x + player.w - px, px + pw - player.x);
      if (player.x + player.w/2 < px + pw/2) player.x -= overlapX;
      else                                    player.x += overlapX;
    }
    return false;
  }

  // ─── プレイヤー更新 ────────────────────────────────────
  function updatePlayer() {
    if (player.invincible > 0) player.invincible--;
    if (player.jumpCooldown > 0) player.jumpCooldown--;

    // 横移動
    if (keys['ArrowLeft']) {
      player.vx = Math.max(player.vx - ACCEL, -PLAYER_SPEED);
      player.dir = -1;
    } else if (keys['ArrowRight']) {
      player.vx = Math.min(player.vx + ACCEL,  PLAYER_SPEED);
      player.dir =  1;
    } else {
      player.vx *= FRICTION;
      if (Math.abs(player.vx) < 0.1) player.vx = 0;
    }

    if (player.onGround && player.vx !== 0 && animTick % 8 === 0)
      player.walkFrame = (player.walkFrame + 1) % 4;

    // ジャンプ
    if ((keys['ArrowUp'] || keys['Space']) && player.onGround && player.jumpCooldown === 0) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
    }

    // 物理
    player.vy += GRAVITY;
    player.x  += player.vx;
    player.y  += player.vy;

    if (player.x < 0)                          player.x = 0;
    if (player.x + player.w > WORLD_WIDTH)     player.x = WORLD_WIDTH - player.w;

    const wasOnGround   = player.onGround;
    player.onGround = false;

    // 地面
    if (player.y + player.h >= GROUND_Y) {
      player.y  = GROUND_Y - player.h;
      player.vy = 0;
      if (!wasOnGround) player.jumpCooldown = JUMP_CD;
      player.onGround = true;
    }

    // 通常足場
    for (const p of PLATFORMS) collidePlatform(p.x, p.y, p.w, p.h, wasOnGround);

    // 消え足場
    for (const p of vanishPlatforms) {
      if (p.state === 'gone') continue;
      const landed = collidePlatform(p.x, p.y, p.w, p.h, wasOnGround);
      if (landed && p.state === 'solid') {
        p.state = 'shaking';
        p.timer = 55;
      }
    }

    // 偽足場
    for (const p of fakePlatforms) {
      if (p.y > H + 50) continue;
      const landed = collidePlatform(p.x, p.y, p.w, p.h, wasOnGround);
      if (landed && p.state === 'solid') {
        p.state = 'falling';
        p.vy    = 0.5;
      }
    }

    // 動く障害物との当たり
    if (player.invincible === 0) {
      for (const o of movingObstacles) {
        if (!o.active) continue;
        if (rectOverlap(player.x, player.y, player.w, player.h, o.x, o.y, o.w, o.h)) {
          loseLife();
          return;
        }
      }
    }

    // スパイク（即死）
    if (player.invincible === 0) {
      for (const s of SPIKES) {
        if (rectOverlap(
          player.x + 3, player.y + 3, player.w - 6, player.h - 6,
          s.x + 3,      s.y + 3,      s.w - 6,      s.h - 6
        )) {
          loseLife();
          return;
        }
      }
    }

    // 落下死
    if (player.y > H + 100) { loseLife(); return; }
  }

  // ─── 消え足場更新 ─────────────────────────────────────
  function updateVanishPlatforms() {
    for (const p of vanishPlatforms) {
      if (p.state === 'shaking') {
        p.timer--;
        if (p.timer <= 0) { p.state = 'gone'; p.restoreTimer = 220; }
      } else if (p.state === 'gone') {
        p.restoreTimer--;
        if (p.restoreTimer <= 0) p.state = 'solid';
      }
    }
  }

  // ─── 偽足場更新 ───────────────────────────────────────
  function updateFakePlatforms() {
    for (const p of fakePlatforms) {
      if (p.state !== 'falling') continue;
      p.vy += 0.6;
      p.y  += p.vy;
      if (p.y > H + 100) { p.y = p.origY; p.vy = 0; p.state = 'solid'; }
    }
  }

  // ─── 動く障害物更新 ───────────────────────────────────
  function updateMovingObstacles() {
    for (const o of movingObstacles) {
      // トリガー検知
      if (!o.triggered && player.x > o.triggerX) {
        o.triggered = true;
        o.active    = true;
      }
      if (!o.active) continue;

      if (o.type === 'hwall') {
        // 右から高速スライドイン
        if (o.x > o.targetX + 1) {
          o.vx -= 1.0;
          if (o.vx < -14) o.vx = -14;
          o.x += o.vx;
          if (o.x < o.targetX) o.x = o.targetX;
        }
        // 停止後、一定時間で引き戻す
        if (o.x <= o.targetX + 1) {
          if (o.retractTimer === undefined) o.retractTimer = 80;
          o.retractTimer--;
          if (o.retractTimer <= 0) {
            o.x         = o.origX;
            o.vx        = 0;
            o.active    = false;
            o.triggered = false;
            o.retractTimer = undefined;
          }
        }
      } else if (o.type === 'vceil') {
        // 上から急落下する天井
        if (!o.falling) { o.falling = true; o.vy = 2; }
        if (o.y < o.targetY) {
          o.vy += 0.7;
          if (o.vy > 18) o.vy = 18;
          o.y += o.vy;
          if (o.y >= o.targetY) { o.y = o.targetY; o.retractTimer = 70; }
        } else if (o.retractTimer > 0) {
          o.retractTimer--;
          if (o.retractTimer <= 0) o.vy = -4;
        } else {
          o.y += o.vy;
          if (o.y <= o.origY) {
            o.y         = o.origY;
            o.vy        = 0;
            o.active    = false;
            o.triggered = false;
            o.falling   = false;
          }
        }
      }
    }
  }

  // ─── コイン更新 ───────────────────────────────────────
  function updateCoins() {
    for (const c of coins) {
      if (c.collected) continue;
      if (rectOverlap(player.x, player.y, player.w, player.h, c.x-c.r, c.y-c.r, c.r*2, c.r*2))
        c.collected = true;
    }
  }

  // ─── ゴール判定 ───────────────────────────────────────
  function checkGoal() {
    if (!goalReached && player.x + player.w >= goalX) {
      goalReached = true;
      gameState   = 'clear';
    }
  }

  // ─── カメラ更新 ───────────────────────────────────────
  function updateCamera() {
    cameraX = Math.max(0, Math.min(player.x - W/3, WORLD_WIDTH - W));
  }

  // ─── 描画補助 ─────────────────────────────────────────
  function adjustColor(hex, d) {
    const r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16) + d));
    const g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16) + d));
    const b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16) + d));
    return `rgb(${r},${g},${b})`;
  }

  function drawPlatformAt(sx, sy, pw, ph, color) {
    ctx.fillStyle = color;
    ctx.fillRect(sx, sy, pw, ph);
    ctx.fillStyle = adjustColor(color, 40);
    ctx.fillRect(sx, sy, pw, 5);
    ctx.fillStyle = adjustColor(color, -40);
    ctx.fillRect(sx, sy + ph - 4, pw, 4);
  }

  // ─── 描画：背景 ───────────────────────────────────────
  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#0d1a2e');
    grad.addColorStop(1, '#1a3355');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // 不気味な雲
    ctx.fillStyle = 'rgba(80,80,110,0.4)';
    for (let i = 0; i < 5; i++) {
      const cx = ((i * 200 + 80 - cameraX * (0.14 + i * 0.01)) % (W+300) + W+300) % (W+300) - 150;
      const cy = 40 + i * 15;
      ctx.beginPath();
      ctx.arc(cx,    cy,    30, 0, Math.PI*2);
      ctx.arc(cx+30, cy-10, 25, 0, Math.PI*2);
      ctx.arc(cx+55, cy,    28, 0, Math.PI*2);
      ctx.fill();
    }

    // 地面
    const gGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    gGrad.addColorStop(0,    '#2a3d12');
    gGrad.addColorStop(0.15, '#1e2d0a');
    gGrad.addColorStop(0.16, '#3B2210');
    gGrad.addColorStop(1,    '#2b1a0a');
    ctx.fillStyle = gGrad;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.strokeStyle = '#1a2d08';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 2); ctx.lineTo(W, GROUND_Y + 2);
    ctx.stroke();
  }

  // ─── 描画：通常足場 ───────────────────────────────────
  function drawPlatforms() {
    for (const p of PLATFORMS) {
      const sx = p.x - cameraX;
      if (sx + p.w < 0 || sx > W) continue;
      drawPlatformAt(sx, p.y, p.w, p.h, p.color);
    }
  }

  // ─── 描画：消え足場 ───────────────────────────────────
  function drawVanishPlatforms() {
    for (const p of vanishPlatforms) {
      if (p.state === 'gone') continue;
      const sx = p.x - cameraX;
      if (sx + p.w < 0 || sx > W) continue;
      let alpha = 1;
      let shake = 0;
      if (p.state === 'shaking') {
        alpha = Math.max(0.1, p.timer / 55);
        shake = (Math.random() - 0.5) * 3;
      }
      ctx.globalAlpha = alpha;
      drawPlatformAt(sx + shake, p.y, p.w, p.h, p.color);
      ctx.globalAlpha = 1;
    }
  }

  // ─── 描画：偽足場（通常足場と全く同じ見た目）──────────
  function drawFakePlatforms() {
    for (const p of fakePlatforms) {
      if (p.y > H + 50) continue;
      const sx = p.x - cameraX;
      if (sx + p.w < 0 || sx > W) continue;
      drawPlatformAt(sx, p.y, p.w, p.h, p.color);
    }
  }

  // ─── 描画：スパイク ───────────────────────────────────
  function drawSpikes() {
    for (const s of SPIKES) {
      const sx = s.x - cameraX;
      if (sx + s.w < 0 || sx > W) continue;
      const count = Math.max(1, Math.floor(s.w / 14));
      const sw = s.w / count;
      for (let i = 0; i < count; i++) {
        const tx = sx + i * sw;
        // 本体
        ctx.fillStyle = '#bb2222';
        ctx.beginPath();
        if (s.dir === 'up') {
          ctx.moveTo(tx,        s.y + s.h);
          ctx.lineTo(tx + sw/2, s.y);
          ctx.lineTo(tx + sw,   s.y + s.h);
        } else {
          ctx.moveTo(tx,        s.y);
          ctx.lineTo(tx + sw/2, s.y + s.h);
          ctx.lineTo(tx + sw,   s.y);
        }
        ctx.closePath();
        ctx.fill();
        // ハイライト
        ctx.fillStyle = '#ee5555';
        ctx.beginPath();
        if (s.dir === 'up') {
          ctx.moveTo(tx + sw*0.15, s.y + s.h);
          ctx.lineTo(tx + sw*0.45, s.y + s.h*0.15);
          ctx.lineTo(tx + sw*0.3,  s.y + s.h*0.6);
        } else {
          ctx.moveTo(tx + sw*0.15, s.y);
          ctx.lineTo(tx + sw*0.45, s.y + s.h*0.85);
          ctx.lineTo(tx + sw*0.3,  s.y + s.h*0.4);
        }
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  // ─── 描画：動く障害物 ─────────────────────────────────
  function drawMovingObstacles() {
    for (const o of movingObstacles) {
      if (!o.active) continue;
      const sx = o.x - cameraX;
      if (sx + o.w < 0 || sx > W) continue;
      ctx.fillStyle = o.color;
      ctx.fillRect(sx, o.y, o.w, o.h);
      // 危険マーク（黄黒縞）
      ctx.save();
      ctx.beginPath();
      ctx.rect(sx, o.y, o.w, o.h);
      ctx.clip();
      ctx.fillStyle = '#ffaa00';
      for (let i = -o.h; i < o.w + o.h; i += 20) {
        ctx.fillRect(sx + i, o.y, 10, o.h);
      }
      ctx.restore();
      ctx.strokeStyle = '#ff2200';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx, o.y, o.w, o.h);
    }
  }

  // ─── 描画：コイン ─────────────────────────────────────
  function drawCoins() {
    for (const c of coins) {
      if (c.collected) continue;
      const sx = c.x - cameraX;
      if (sx < -20 || sx > W + 20) continue;
      const bob = Math.sin(animTick * 0.08 + c.x * 0.05) * 3;
      ctx.fillStyle = '#cc8800';
      ctx.beginPath();
      ctx.ellipse(sx, c.y + bob, c.r, c.r, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.ellipse(sx, c.y + bob, c.r * 0.65, c.r * 0.65, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fffaaa';
      ctx.beginPath();
      ctx.ellipse(sx - 2, c.y + bob - 2, c.r * 0.3, c.r * 0.3, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ─── 描画：ゴール旗 ───────────────────────────────────
  function drawGoal() {
    const sx = goalX - cameraX;
    if (sx < -50 || sx > W + 50) return;
    ctx.fillStyle = '#aaaaaa';
    ctx.fillRect(sx, GROUND_Y - 120, 6, 120);
    const wave = Math.sin(animTick * 0.12) * 5;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.moveTo(sx + 6, GROUND_Y - 120);
    ctx.lineTo(sx + 50 + wave, GROUND_Y - 100 + wave*0.5);
    ctx.lineTo(sx + 6, GROUND_Y - 80);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GOAL', sx + 22, GROUND_Y - 98);
  }

  // ─── 描画：プレイヤー（AIヒーロー） ──────────────────
  function drawPlayer() {
    if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) return;
    const sx = player.x - cameraX;
    const sy = player.y;
    const d  = player.dir;
    const cx = sx + player.w / 2;

    let legL = 0, legR = 0;
    if (player.onGround && player.vx !== 0) {
      legL =  Math.sin(animTick * 0.25) * 6;
      legR = -legL;
    }

    // ブーツ
    ctx.fillStyle = '#223399';
    ctx.fillRect(sx + 1,             sy + player.h - 8 + legL, 11, 8);
    ctx.fillRect(sx + player.w - 12, sy + player.h - 8 + legR, 11, 8);
    // 脚
    ctx.fillStyle = '#3344bb';
    ctx.fillRect(sx + 3,             sy + player.h - 16 + legL, 9, 10);
    ctx.fillRect(sx + player.w - 12, sy + player.h - 16 + legR, 9, 10);
    // 胴体
    ctx.fillStyle = '#1155cc';
    ctx.fillRect(sx + 3, sy + 13, player.w - 6, player.h - 25);
    // 胸ロゴ
    ctx.fillStyle = '#aaddff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AI', cx, sy + 23);
    // 腕
    const armSwing = player.vx !== 0 ? Math.sin(animTick * 0.25) * 5 : 0;
    ctx.fillStyle = '#1155cc';
    ctx.fillRect(sx - 2,             sy + 14 - armSwing, 5, 12);
    ctx.fillRect(sx + player.w - 3,  sy + 14 + armSwing, 5, 12);
    // グローブ
    ctx.fillStyle = '#ffddaa';
    ctx.beginPath();
    ctx.arc(sx,            sy + 24 - armSwing, 4, 0, Math.PI*2);
    ctx.arc(sx + player.w, sy + 24 + armSwing, 4, 0, Math.PI*2);
    ctx.fill();
    // ヘルメット
    ctx.fillStyle = '#0088ee';
    ctx.beginPath();
    ctx.roundRect(sx + 2, sy + 1, player.w - 4, 14, 5);
    ctx.fill();
    // バイザー
    ctx.fillStyle = '#001133';
    ctx.beginPath();
    ctx.roundRect(sx + 5, sy + 4, player.w - 10, 8, 3);
    ctx.fill();
    // バイザー発光
    ctx.fillStyle = '#00ffcc';
    ctx.globalAlpha = 0.7 + Math.sin(animTick * 0.1) * 0.3;
    ctx.beginPath();
    ctx.roundRect(sx + 6, sy + 5, player.w - 12, 6, 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // アンテナ
    ctx.strokeStyle = '#0088ee';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx + d * 2, sy + 1);
    ctx.lineTo(cx + d * 5, sy - 7);
    ctx.stroke();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(cx + d * 5, sy - 8, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // ─── 描画：UI ─────────────────────────────────────────
  function drawUI() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, 40);

    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'left';

    // 残機
    ctx.fillStyle = '#ff6688';
    ctx.fillText(`♥ × ${lives}`, 10, 26);

    // 死亡回数
    ctx.fillStyle = '#ff4444';
    ctx.fillText(`💀 ${deathCount}回`, 105, 26);

    // コイン
    const collected = coins.filter(c => c.collected).length;
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(`🪙 ${collected}/${TOTAL_COINS}`, 235, 26);

    // 進行バー
    ctx.fillStyle = '#333';
    ctx.fillRect(390, 15, 270, 10);
    const progress = Math.min(1, player.x / WORLD_WIDTH);
    ctx.fillStyle = '#00ffcc';
    ctx.fillRect(390, 15, 270 * progress, 10);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(390, 15, 270, 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PROGRESS', 525, 13);

    // 死亡フラッシュ
    if (deathFlash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${(deathFlash / 25) * 0.5})`;
      ctx.fillRect(0, 0, W, H);
      deathFlash--;
    }
  }

  // ─── 描画：ゲームオーバー ─────────────────────────────
  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 50px monospace';
    ctx.fillText('GAME OVER', W/2, H/2 - 50);

    ctx.fillStyle = '#ffdd44';
    ctx.font = '20px monospace';
    ctx.fillText(`死亡回数: ${deathCount}回`, W/2, H/2 + 5);

    ctx.fillStyle = '#ff9988';
    ctx.font = '15px monospace';
    ctx.fillText('諦めるな！死んで覚えろ！', W/2, H/2 + 38);

    ctx.fillStyle = '#aaddff';
    ctx.font = '15px monospace';
    ctx.fillText('スペースキーでリスタート', W/2, H/2 + 68);
  }

  // ─── 描画：クリア ─────────────────────────────────────
  function drawClear() {
    ctx.fillStyle = 'rgba(0,20,40,0.8)';
    ctx.fillRect(0, 0, W, H);

    // 星キラキラ
    ctx.fillStyle = '#ffdd44';
    for (let i = 0; i < 20; i++) {
      const sx = (i * 137 + animTick * 2) % W;
      const sy = (i * 97  + animTick)     % (H - 60);
      drawStar(sx, sy, 3 + Math.sin(animTick * 0.1 + i) * 2);
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 44px monospace';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur  = 20;
    ctx.fillText('STAGE CLEAR!', W/2, H/2 - 55);
    ctx.shadowBlur  = 0;

    ctx.fillStyle = '#ff8888';
    ctx.font = '20px monospace';
    ctx.fillText(`死亡回数: ${deathCount}回`, W/2, H/2);

    const msg =
      deathCount === 0 ? '完璧！天才すぎる！' :
      deathCount < 5   ? 'さすが！やるじゃん！' :
      deathCount < 15  ? 'よく頑張った！' :
      deathCount < 30  ? 'だいぶ苦労したね...' :
                         '何回死んでも諦めない精神！';
    ctx.fillStyle = '#aaffcc';
    ctx.font = '16px monospace';
    ctx.fillText(msg, W/2, H/2 + 38);

    ctx.fillStyle = '#aaddff';
    ctx.font = '15px monospace';
    ctx.fillText('スペースキーでリスタート', W/2, H/2 + 72);
  }

  function drawStar(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI/2;
      const b = ((i * 4 + 2) * Math.PI / 5) - Math.PI/2;
      if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
      else         ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      ctx.lineTo(Math.cos(b)*r*0.4, Math.sin(b)*r*0.4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ─── ゲームループ ─────────────────────────────────────
  function gameLoop() {
    animTick++;
    ctx.clearRect(0, 0, W, H);

    if (gameState === 'playing') {
      updatePlayer();
      updateVanishPlatforms();
      updateFakePlatforms();
      updateMovingObstacles();
      updateCoins();
      checkGoal();
      updateCamera();
    }

    drawBackground();
    drawPlatforms();
    drawVanishPlatforms();
    drawFakePlatforms();
    drawSpikes();
    drawMovingObstacles();
    drawCoins();
    drawGoal();
    drawPlayer();
    drawUI();

    if (gameState === 'gameover') drawGameOver();
    if (gameState === 'clear')    drawClear();

    requestAnimationFrame(gameLoop);
  }

  // ─── 開始 ─────────────────────────────────────────────
  gameLoop();
})();
</script>
