<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AIヒーロー大冒険</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
  }
  h1 {
    color: #e0e0ff;
    font-size: 24px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #6060ff;
  }
  #gameCanvas {
    border: 3px solid #6060ff;
    box-shadow: 0 0 20px #6060ff88;
    display: block;
  }
  #controls {
    color: #aaaacc;
    font-size: 13px;
    margin-top: 8px;
  }
</style>
</head>
<body>
<h1>🤖 AIヒーロー大冒険 🤖</h1>
<canvas id="gameCanvas" width="680" height="400"></canvas>
<div id="controls">← → 移動 ｜ ↑ / スペース ジャンプ</div>
<script>
(function() {
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // roundRect ポリフィル（未対応ブラウザ向け）
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      const radius = Math.min(r, w/2, h/2);
      this.moveTo(x + radius, y);
      this.lineTo(x + w - radius, y);
      this.arcTo(x + w, y, x + w, y + radius, radius);
      this.lineTo(x + w, y + h - radius);
      this.arcTo(x + w, y + h, x + w - radius, y + h, radius);
      this.lineTo(x + radius, y + h);
      this.arcTo(x, y + h, x, y + h - radius, radius);
      this.lineTo(x, y + radius);
      this.arcTo(x, y, x + radius, y, radius);
      this.closePath();
    };
  }

  // ─── 定数 ────────────────────────────────────────────
  const W = 680, H = 400;
  const GRAVITY = 0.3;
  const JUMP_FORCE = -13.5;
  const JUMP_COOLDOWN = 18; // 着地後のジャンプ禁止フレーム数（約0.3秒）
  const PLAYER_SPEED = 2.1;
  const ACCEL = 0.35;
  const FRICTION = 0.78;
  const WORLD_WIDTH = 3200;
  const GROUND_Y = 340;
  const TILE_H = 20;

  // ─── ステート ─────────────────────────────────────────
  let gameState = 'playing'; // 'playing' | 'gameover' | 'clear'
  let score = 0;
  let lives = 3;
  let cameraX = 0;
  let animTick = 0;

  // ─── キー入力 ─────────────────────────────────────────
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code)) e.preventDefault();
    if ((gameState === 'gameover' || gameState === 'clear') && e.code === 'Space') restartGame();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // ─── 地形データ ───────────────────────────────────────
  // {x, y, w, h, color}
  const platforms = [
    // 序盤
    {x:200,  y:280, w:120, h:20, color:'#4a9e4a'},
    {x:380,  y:240, w:100, h:20, color:'#4a9e4a'},
    {x:540,  y:200, w:120, h:20, color:'#4a9e4a'},
    {x:700,  y:260, w:80,  h:20, color:'#4a9e4a'},
    {x:840,  y:220, w:100, h:20, color:'#4a9e4a'},
    // 中盤
    {x:1000, y:280, w:140, h:20, color:'#4a9e4a'},
    {x:1180, y:230, w:80,  h:20, color:'#4a9e4a'},
    {x:1320, y:190, w:100, h:20, color:'#4a9e4a'},
    {x:1480, y:250, w:120, h:20, color:'#4a9e4a'},
    {x:1650, y:210, w:90,  h:20, color:'#4a9e4a'},
    // 後半
    {x:1800, y:270, w:110, h:20, color:'#9e4a4a'},
    {x:1960, y:230, w:80,  h:20, color:'#9e4a4a'},
    {x:2100, y:190, w:120, h:20, color:'#9e4a4a'},
    {x:2280, y:240, w:90,  h:20, color:'#9e4a4a'},
    {x:2450, y:200, w:110, h:20, color:'#9e4a4a'},
    // 終盤
    {x:2640, y:260, w:80,  h:20, color:'#9e9e4a'},
    {x:2780, y:220, w:100, h:20, color:'#9e9e4a'},
    {x:2930, y:180, w:120, h:20, color:'#9e9e4a'},
    // ゴール台
    {x:3050, y:280, w:80,  h:60, color:'#cc8800'},
  ];

  // ─── コイン ───────────────────────────────────────────
  function makeCoin(x, y) { return {x, y, r:8, collected:false}; }
  let coins = [
    makeCoin(220, 260), makeCoin(240, 260), makeCoin(260, 260),
    makeCoin(400, 220), makeCoin(420, 220),
    makeCoin(560, 180), makeCoin(580, 180), makeCoin(600, 180),
    makeCoin(720, 240), makeCoin(740, 240),
    makeCoin(860, 200), makeCoin(880, 200),
    makeCoin(1020, 260), makeCoin(1040, 260), makeCoin(1060, 260),
    makeCoin(1190, 210), makeCoin(1210, 210),
    makeCoin(1340, 170), makeCoin(1360, 170), makeCoin(1380, 170),
    makeCoin(1500, 230), makeCoin(1520, 230),
    makeCoin(1660, 190), makeCoin(1680, 190),
    makeCoin(1820, 250), makeCoin(1840, 250), makeCoin(1860, 250),
    makeCoin(1970, 210), makeCoin(1990, 210),
    makeCoin(2120, 170), makeCoin(2140, 170), makeCoin(2160, 170),
    makeCoin(2300, 220), makeCoin(2320, 220),
    makeCoin(2470, 180), makeCoin(2490, 180),
    makeCoin(2660, 240), makeCoin(2680, 240),
    makeCoin(2800, 200), makeCoin(2820, 200),
    makeCoin(2950, 160), makeCoin(2970, 160), makeCoin(2990, 160),
  ];
  const TOTAL_COINS = coins.length;

  // ─── 敵 ───────────────────────────────────────────────
  function makeEnemy(x, y, range) {
    return {x, y, w:28, h:28, vx:-1, originX:x, range, alive:true, stomped:false, stompTimer:0};
  }
  let enemies = [
    makeEnemy(300,  GROUND_Y - 28, 120),
    makeEnemy(600,  GROUND_Y - 28, 100),
    makeEnemy(750,  GROUND_Y - 28, 80),
    makeEnemy(900,  GROUND_Y - 28, 120),
    makeEnemy(560,  200 - 28,      80),   // 足場上
    makeEnemy(1050, GROUND_Y - 28, 130),
    makeEnemy(1200, GROUND_Y - 28, 100),
    makeEnemy(1340, 190 - 28,      80),
    makeEnemy(1500, GROUND_Y - 28, 120),
    makeEnemy(1700, GROUND_Y - 28, 150),
    makeEnemy(1820, 270 - 28,      90),
    makeEnemy(1900, GROUND_Y - 28, 100),
    makeEnemy(2050, GROUND_Y - 28, 130),
    makeEnemy(2200, GROUND_Y - 28, 120),
    makeEnemy(2320, 240 - 28,      70),
    makeEnemy(2500, GROUND_Y - 28, 130),
    makeEnemy(2650, GROUND_Y - 28, 100),
    makeEnemy(2800, GROUND_Y - 28, 140),
    makeEnemy(2950, 180 - 28,      100),
  ];

  // ─── プレイヤー ───────────────────────────────────────
  function makePlayer() {
    return {
      x: 60, y: GROUND_Y - 36,
      w: 28, h: 36,
      vx: 0, vy: 0,
      onGround: false,
      dir: 1,        // 1=右, -1=左
      walkFrame: 0,
      invincible: 0, // 無敵フレーム数
      jumpCooldown: 0, // ジャンプクールタイム
    };
  }
  let player = makePlayer();

  // ─── ゴール旗 ─────────────────────────────────────────
  const goalX = 3090;
  let goalReached = false;

  // ─── ゲームリスタート ──────────────────────────────────
  function restartGame() {
    score = 0;
    lives = 3;
    cameraX = 0;
    animTick = 0;
    goalReached = false;
    gameState = 'playing';
    player = makePlayer();
    coins = coins.map(c => ({...c, collected:false}));
    enemies = enemies.map(e => ({...e, alive:true, stomped:false, stompTimer:0, x:e.originX, vx:-1}));
  }

  // ─── AABB衝突判定 ─────────────────────────────────────
  function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  // ─── プレイヤー更新 ────────────────────────────────────
  function updatePlayer() {
    if (player.invincible > 0) player.invincible--;
    if (player.jumpCooldown > 0) player.jumpCooldown--;

    // 横移動（慣性あり）
    let moving = false;
    if (keys['ArrowLeft'])  {
      player.vx = Math.max(player.vx - ACCEL, -PLAYER_SPEED);
      player.dir = -1; moving = true;
    } else if (keys['ArrowRight']) {
      player.vx = Math.min(player.vx + ACCEL,  PLAYER_SPEED);
      player.dir =  1; moving = true;
    } else {
      player.vx *= FRICTION;
      if (Math.abs(player.vx) < 0.1) player.vx = 0;
    }

    if (moving && player.onGround) {
      if (animTick % 8 === 0) player.walkFrame = (player.walkFrame + 1) % 4;
    }

    // ジャンプ
    if ((keys['ArrowUp'] || keys['Space']) && player.onGround && player.jumpCooldown === 0) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
    }

    // 重力
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // 世界端
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > WORLD_WIDTH) player.x = WORLD_WIDTH - player.w;

    const wasOnGround = player.onGround;
    player.onGround = false;

    // 地面
    if (player.y + player.h >= GROUND_Y) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      if (!wasOnGround) player.jumpCooldown = JUMP_COOLDOWN;
      player.onGround = true;
    }

    // 足場
    for (const p of platforms) {
      if (rectOverlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
        // 上から乗る判定
        const prevBottom = player.y + player.h - player.vy;
        if (prevBottom <= p.y + 1 && player.vy >= 0) {
          player.y = p.y - player.h;
          player.vy = 0;
          if (!wasOnGround) player.jumpCooldown = JUMP_COOLDOWN;
          player.onGround = true;
        } else if (player.vy < 0 && player.y <= p.y + p.h) {
          // 下から頭をぶつけた
          player.y = p.y + p.h;
          player.vy = 0;
        } else {
          // 横からめり込み解消
          const overlapX = Math.min(player.x+player.w - p.x, p.x+p.w - player.x);
          if (player.x + player.w/2 < p.x + p.w/2) player.x -= overlapX;
          else player.x += overlapX;
        }
      }
    }

    // 落下死
    if (player.y > H + 100) {
      loseLife();
    }
  }

  // ─── 敵更新 ───────────────────────────────────────────
  function updateEnemies() {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (e.stomped) {
        e.stompTimer--;
        if (e.stompTimer <= 0) e.alive = false;
        continue;
      }

      e.x += e.vx;
      // 折り返し
      if (e.x < e.originX - e.range || e.x > e.originX + e.range) e.vx *= -1;

      // 足場との当たり（簡易：足場端での折り返し）
      for (const p of platforms) {
        if (rectOverlap(e.x, e.y, e.w, e.h, p.x, p.y, p.w, p.h)) {
          const prevBottom = e.y + e.h - 1;
          if (prevBottom <= p.y + 2) {
            e.y = p.y - e.h;
          } else {
            e.vx *= -1;
          }
        }
      }

      // 地面
      if (e.y + e.h > GROUND_Y) {
        e.y = GROUND_Y - e.h;
      }

      // プレイヤーとの当たり
      if (player.invincible > 0) continue;
      if (!rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) continue;

      // 踏み判定：プレイヤー下部が敵上部より上から来た場合
      const playerBottom = player.y + player.h;
      const enemyTop = e.y;
      if (player.vy > 0 && playerBottom - e.h * 0.4 <= enemyTop + 8) {
        // 踏んだ
        e.stomped = true;
        e.stompTimer = 30;
        player.vy = -7; // 踏んだ反発
        score += 100;
      } else {
        loseLife();
      }
    }
  }

  // ─── コイン更新 ───────────────────────────────────────
  function updateCoins() {
    for (const c of coins) {
      if (c.collected) continue;
      const cx = c.x - c.r, cy = c.y - c.r, cw = c.r*2, ch = c.r*2;
      if (rectOverlap(player.x, player.y, player.w, player.h, cx, cy, cw, ch)) {
        c.collected = true;
        score += 10;
      }
    }
  }

  // ─── ゴール判定 ───────────────────────────────────────
  function checkGoal() {
    if (player.x + player.w >= goalX && !goalReached) {
      goalReached = true;
      score += coins.filter(c => c.collected).length === TOTAL_COINS ? 500 : 200;
      gameState = 'clear';
    }
  }

  // ─── 残機減少 ─────────────────────────────────────────
  function loseLife() {
    lives--;
    if (lives <= 0) {
      lives = 0;
      gameState = 'gameover';
    } else {
      // リスポーン
      player.x = Math.max(0, cameraX - 40);
      player.y = GROUND_Y - player.h;
      player.vx = 0; player.vy = 0;
      player.invincible = 90;
    }
  }

  // ─── カメラ更新 ───────────────────────────────────────
  function updateCamera() {
    const target = player.x - W / 3;
    cameraX = Math.max(0, Math.min(target, WORLD_WIDTH - W));
  }

  // ─── 描画：背景 ───────────────────────────────────────
  function drawBackground() {
    // 空グラデーション
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#1a6baa');
    grad.addColorStop(1, '#5bc8ff');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // 雲（視差スクロール）
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    drawCloud(120 - cameraX * 0.2, 50);
    drawCloud(350 - cameraX * 0.15, 80);
    drawCloud(580 - cameraX * 0.2, 40);
    drawCloud(800 - cameraX * 0.18, 70);
    drawCloud(1050 - cameraX * 0.15, 55);

    // 地面
    const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    groundGrad.addColorStop(0, '#5d8a2f');
    groundGrad.addColorStop(0.15, '#4a6e22');
    groundGrad.addColorStop(0.16, '#8B5E2A');
    groundGrad.addColorStop(1, '#6b4420');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // 地面のライン
    ctx.strokeStyle = '#3a5a18';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 3);
    ctx.lineTo(W, GROUND_Y + 3);
    ctx.stroke();
  }

  function drawCloud(cx, cy) {
    const x = ((cx % (W + 300)) + W + 300) % (W + 300) - 150;
    ctx.beginPath();
    ctx.arc(x,    cy,    30, 0, Math.PI*2);
    ctx.arc(x+30, cy-10, 25, 0, Math.PI*2);
    ctx.arc(x+55, cy,    28, 0, Math.PI*2);
    ctx.arc(x+25, cy+5,  20, 0, Math.PI*2);
    ctx.fill();
  }

  // ─── 描画：足場 ───────────────────────────────────────
  function drawPlatforms() {
    for (const p of platforms) {
      const sx = p.x - cameraX;
      if (sx + p.w < 0 || sx > W) continue;

      ctx.fillStyle = p.color;
      ctx.fillRect(sx, p.y, p.w, p.h);
      // 上面明るく
      ctx.fillStyle = adjustColor(p.color, 40);
      ctx.fillRect(sx, p.y, p.w, 5);
      // 下面暗く
      ctx.fillStyle = adjustColor(p.color, -40);
      ctx.fillRect(sx, p.y + p.h - 4, p.w, 4);
    }
  }

  function adjustColor(hex, delta) {
    let r = parseInt(hex.slice(1,3),16);
    let g = parseInt(hex.slice(3,5),16);
    let b = parseInt(hex.slice(5,7),16);
    r = Math.max(0, Math.min(255, r+delta));
    g = Math.max(0, Math.min(255, g+delta));
    b = Math.max(0, Math.min(255, b+delta));
    return `rgb(${r},${g},${b})`;
  }

  // ─── 描画：コイン ─────────────────────────────────────
  function drawCoins() {
    for (const c of coins) {
      if (c.collected) continue;
      const sx = c.x - cameraX;
      if (sx < -20 || sx > W + 20) continue;

      const bob = Math.sin(animTick * 0.08 + c.x * 0.05) * 3;

      // 外枠
      ctx.fillStyle = '#cc8800';
      ctx.beginPath();
      ctx.ellipse(sx, c.y + bob, c.r, c.r, 0, 0, Math.PI*2);
      ctx.fill();
      // 内側光沢
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.ellipse(sx, c.y + bob, c.r * 0.65, c.r * 0.65, 0, 0, Math.PI*2);
      ctx.fill();
      // ハイライト
      ctx.fillStyle = '#fffaaa';
      ctx.beginPath();
      ctx.ellipse(sx - 2, c.y + bob - 2, c.r * 0.3, c.r * 0.3, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ─── 描画：敵 ─────────────────────────────────────────
  function drawEnemies() {
    for (const e of enemies) {
      if (!e.alive) continue;
      const sx = e.x - cameraX;
      if (sx + e.w < 0 || sx > W) continue;

      if (e.stomped) {
        // 踏まれた状態（つぶれた）
        ctx.fillStyle = '#8B0000';
        ctx.fillRect(sx, e.y + e.h - 8, e.w, 8);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(sx+2, e.y + e.h - 6, e.w-4, 4);
        continue;
      }

      const walk = Math.sin(animTick * 0.18) * 3;
      const cx = sx + e.w/2;
      const cy = e.y + e.h/2;

      // 胴体（スライム風）
      ctx.fillStyle = '#cc2222';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2 + walk*0.3, e.w/2, e.h/2 - walk*0.3, 0, 0, Math.PI*2);
      ctx.fill();

      // 頭
      ctx.fillStyle = '#dd4444';
      ctx.beginPath();
      ctx.arc(cx, cy - 4 + walk, e.w/2 - 2, 0, Math.PI*2);
      ctx.fill();

      // 目
      const eyeOff = e.vx > 0 ? 4 : -4;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx + eyeOff, cy - 6 + walk, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx + eyeOff + (e.vx > 0 ? 1 : -1), cy - 6 + walk, 2, 0, Math.PI*2);
      ctx.fill();

      // 怒り眉
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      if (e.vx > 0) {
        ctx.moveTo(cx+1, cy-11+walk); ctx.lineTo(cx+8, cy-9+walk);
      } else {
        ctx.moveTo(cx-1, cy-11+walk); ctx.lineTo(cx-8, cy-9+walk);
      }
      ctx.stroke();

      // 脚
      const legAnim = Math.abs(walk) > 1 ? 4 : 0;
      ctx.fillStyle = '#991111';
      ctx.fillRect(cx - 8, cy + e.h/2 - 4, 7, 8 + legAnim);
      ctx.fillRect(cx + 1, cy + e.h/2 - 4, 7, 8 - legAnim);
    }
  }

  // ─── 描画：プレイヤー（ロボット風AIヒーロー） ──────────
  function drawPlayer() {
    if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) return;

    const sx = player.x - cameraX;
    const sy = player.y;
    const d = player.dir;
    const cx = sx + player.w / 2;
    const cy = sy + player.h / 2;

    // 脚アニメーション
    let legL = 0, legR = 0;
    if (player.onGround && player.vx !== 0) {
      legL = Math.sin(animTick * 0.25) * 6;
      legR = -Math.sin(animTick * 0.25) * 6;
    }

    // ブーツ
    ctx.fillStyle = '#223399';
    ctx.fillRect(sx + 1,            sy + player.h - 8 + legL, 11, 8);
    ctx.fillRect(sx + player.w - 12, sy + player.h - 8 + legR, 11, 8);

    // 脚
    ctx.fillStyle = '#3344bb';
    ctx.fillRect(sx + 3,             sy + player.h - 16 + legL, 9, 10);
    ctx.fillRect(sx + player.w - 12, sy + player.h - 16 + legR, 9, 10);

    // 胴体（青いスーツ）
    ctx.fillStyle = '#1155cc';
    ctx.fillRect(sx + 3, sy + 13, player.w - 6, player.h - 25);

    // 胸のロゴ「AI」
    ctx.fillStyle = '#aaddff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AI', cx, sy + 23);

    // 腕アニメーション
    const armSwing = player.vx !== 0 ? Math.sin(animTick * 0.25) * 5 : 0;
    ctx.fillStyle = '#1155cc';
    // 左腕
    ctx.fillRect(sx - 2, sy + 14 - armSwing, 5, 12);
    // 右腕
    ctx.fillRect(sx + player.w - 3, sy + 14 + armSwing, 5, 12);

    // グローブ
    ctx.fillStyle = '#ffddaa';
    ctx.beginPath();
    ctx.arc(sx,              sy + 24 - armSwing, 4, 0, Math.PI*2);
    ctx.arc(sx + player.w,   sy + 24 + armSwing, 4, 0, Math.PI*2);
    ctx.fill();

    // 頭（ヘルメット）
    ctx.fillStyle = '#0088ee';
    ctx.beginPath();
    ctx.roundRect(sx + 2, sy + 1, player.w - 4, 14, 5);
    ctx.fill();

    // バイザー（暗い）
    ctx.fillStyle = '#001133';
    ctx.beginPath();
    ctx.roundRect(sx + 5, sy + 4, player.w - 10, 8, 3);
    ctx.fill();

    // バイザー発光
    ctx.fillStyle = '#00ffcc';
    ctx.globalAlpha = 0.7 + Math.sin(animTick * 0.1) * 0.3;
    ctx.beginPath();
    ctx.roundRect(sx + 6, sy + 5, player.w - 12, 6, 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // アンテナ
    ctx.strokeStyle = '#0088ee';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx + d * 2, sy + 1);
    ctx.lineTo(cx + d * 5, sy - 7);
    ctx.stroke();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(cx + d * 5, sy - 8, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // ─── 描画：ゴール旗 ───────────────────────────────────
  function drawGoal() {
    const sx = goalX - cameraX;
    if (sx < -50 || sx > W + 50) return;

    // 柱
    ctx.fillStyle = '#aaaaaa';
    ctx.fillRect(sx, GROUND_Y - 120, 6, 120);

    // 旗
    const flagWave = Math.sin(animTick * 0.12) * 5;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.moveTo(sx + 6, GROUND_Y - 120);
    ctx.lineTo(sx + 50 + flagWave, GROUND_Y - 100 + flagWave*0.5);
    ctx.lineTo(sx + 6, GROUND_Y - 80);
    ctx.fill();

    // 「GOAL」テキスト
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GOAL', sx + 22, GROUND_Y - 100);
  }

  // ─── 描画：UI ─────────────────────────────────────────
  function drawUI() {
    ctx.fillStyle = 'rgba(0,0,20,0.55)';
    ctx.fillRect(0, 0, W, 36);

    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffdd44';
    ctx.fillText(`SCORE: ${score}`, 12, 22);

    ctx.fillStyle = '#ff6688';
    ctx.fillText(`♥ × ${lives}`, 220, 22);

    const collected = coins.filter(c => c.collected).length;
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(`🪙 ${collected}/${TOTAL_COINS}`, 320, 22);

    // ミニマップ（進行バー）
    ctx.fillStyle = '#333';
    ctx.fillRect(450, 12, 210, 10);
    const progress = player.x / WORLD_WIDTH;
    ctx.fillStyle = '#00ffcc';
    ctx.fillRect(450, 12, 210 * progress, 10);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(450, 12, 210, 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PROGRESS', 555, 10);
  }

  // ─── 描画：ゲームオーバー画面 ─────────────────────────
  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 52px monospace';
    ctx.fillText('GAME OVER', W/2, H/2 - 40);

    ctx.fillStyle = '#ffdd44';
    ctx.font = '20px monospace';
    ctx.fillText(`スコア: ${score}`, W/2, H/2 + 10);

    ctx.fillStyle = '#aaddff';
    ctx.font = '16px monospace';
    ctx.fillText('スペースキーでリスタート', W/2, H/2 + 50);
  }

  // ─── 描画：クリア画面 ──────────────────────────────────
  function drawClear() {
    ctx.fillStyle = 'rgba(0,20,40,0.75)';
    ctx.fillRect(0, 0, W, H);

    // 星キラキラ
    ctx.fillStyle = '#ffdd44';
    for (let i = 0; i < 20; i++) {
      const sx = (i * 137 + animTick * 2) % W;
      const sy = (i * 97 + animTick) % (H - 60);
      const size = 3 + Math.sin(animTick * 0.1 + i) * 2;
      drawStar(sx, sy, size);
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 52px monospace';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 20;
    ctx.fillText('STAGE CLEAR!', W/2, H/2 - 50);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#aaffcc';
    ctx.font = '20px monospace';
    ctx.fillText(`最終スコア: ${score}`, W/2, H/2 + 5);

    const collected = coins.filter(c => c.collected).length;
    if (collected === TOTAL_COINS) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '16px monospace';
      ctx.fillText('✨ コイン全取得ボーナス！ ✨', W/2, H/2 + 35);
    }

    ctx.fillStyle = '#aaddff';
    ctx.font = '16px monospace';
    ctx.fillText('スペースキーでリスタート', W/2, H/2 + 70);
  }

  function drawStar(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI/2;
      const b = ((i * 4 + 2) * Math.PI / 5) - Math.PI/2;
      if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      ctx.lineTo(Math.cos(b)*r*0.4, Math.sin(b)*r*0.4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ─── ゲームループ ─────────────────────────────────────
  function gameLoop() {
    animTick++;
    ctx.clearRect(0, 0, W, H);

    if (gameState === 'playing') {
      updatePlayer();
      updateEnemies();
      updateCoins();
      checkGoal();
      updateCamera();
    }

    drawBackground();
    drawPlatforms();
    drawCoins();
    drawGoal();
    drawEnemies();
    drawPlayer();
    drawUI();

    if (gameState === 'gameover') drawGameOver();
    if (gameState === 'clear')    drawClear();

    requestAnimationFrame(gameLoop);
  }

  // ─── 開始 ─────────────────────────────────────────────
  gameLoop();
})();
</script>
</body>
</html>
